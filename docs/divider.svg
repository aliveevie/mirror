<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 4" preserveAspectRatio="none" role="presentation">
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform"
                        type="translate"
                        from="-1 0" to="1 0"
                        dur="6s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="4" fill="url(#d)"/>
</svg>
