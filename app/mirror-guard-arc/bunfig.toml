[install]
# Skip postinstall/prepare/etc. scripts — closes the most common npm
# supply-chain attack vector (malicious postinstall hooks).
ignoreScripts = true
# Pin lockfile entries to exact versions, no ^/~ drift.
saveExact = true
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config"]
